// CRC32
const CRC=(()=>{const t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0}return t})();
function crc32(u8){let c=0xFFFFFFFF;for(let i=0;i<u8.length;i++)c=CRC[(c^u8[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0}
function zipStore(files){const enc=new TextEncoder();const parts=[],cd=[];let off=0;
 function u16(n){return [n&255,(n>>8)&255]}function u32(n){return [n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255]}
 files.forEach(f=>{const name=enc.encode(f.name),data=typeof f.data=="string"?enc.encode(f.data):f.data,crc=crc32(data),len=data.length;
  const lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(len),u32(len),u16(name.length),u16(0));
  parts.push(new Uint8Array(lh),name,data);
  const ch=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(len),u32(len),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(off));
  cd.push(new Uint8Array(ch),name);off+=lh.length+name.length+len});
 let cdoff=off,cdlen=0;cd.forEach(p=>cdlen+=p.length);
 const eo=[].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdlen),u32(cdoff),u16(0));
 const all=parts.concat(cd,[new Uint8Array(eo)]);let total=0;all.forEach(p=>total+=p.length);
 const out=new Uint8Array(total);let q=0;all.forEach(p=>{out.set(p,q);q+=p.length});return out}

 c.innerHTML='<div class="h1">'+bl("Axon editor","Axon editor")+'</div>'+tabs+'<p style="opacity:.6;font-size:12px;margin:0 0 12px">'+bl("Edituj v prohlížeči, nakopíruj z Excelu (Ctrl+V), ukládá se automaticky. Každý stroj je jiný — uprav si sloupce/hodnoty podle sebe.","Edit in browser, paste from Excel (Ctrl+V), auto-saved. Every machine differs — adjust values yourself.")+'</p>'+pre+'<div class="row" style="flex-wrap:wrap;gap:8px;margin-bottom:12px"><button class="btn btn-g" id="ax-add">+ '+bl("Řádek","Row")+'</button>'+itools+'</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'+th+'</tr></thead><tbody id="ax-body">'+rows.map(rowH).join("")+'</tbody></table></div>'+post;
 c.querySelector("#ax-savef").onclick=aSaveFile;
 var _op=c.querySelector("#ax-oper");if(_op)_op.onclick=aOperator;
 c.querySelector("#ax-load").onclick=()=>c.querySelector("#ax-loadf").click();
 c.querySelector("#ax-loadf").onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const j=JSON.parse(rd.result);const base={head:{},interface:[],tool:[],workflow:[],programs:[],products:[],alarms:[],safety:[],layout_img:""};AXP=Array.isArray(j)?Object.assign(base,{interface:j}):Object.assign(base,j,{interface:j.interface||j.rows||[]});aSave();renderBuilder();}catch(x){alert(bl("Neplatný JSON.","Invalid JSON."));}};rd.readAsText(f);};
 c.querySelector("#ax-add").onclick=()=>{aSync();(AXP[BTAB]=AXP[BTAB]||[]).push({});renderBuilder();};
 c.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{aSync();AXP[BTAB].splice(+b.dataset.del,1);if(!AXP[BTAB].length)AXP[BTAB]=[{}];renderBuilder();});
 const body=c.querySelector("#ax-body");
 body.addEventListener("input",aSync);
 body.addEventListener("paste",ev=>{const t=(ev.clipboardData||window.clipboardData).getData("text");if(t&&/[\t\n]/.test(t)){ev.preventDefault();aSync();const cs2=def.cols;t.split(/\r?\n/).filter(l=>l.trim()).forEach(line=>{const a=line.split("\t");const o={};cs2.forEach((col,ci)=>o[col[0]]=a[ci]||"");AXP[BTAB].push(o);});renderBuilder();}});
 if(BTAB=="interface"){const rg=c.querySelector("#ax-range");if(rg)rg.value=AXP.head.byte_range||"16";const vn=c.querySelector("#ax-vendor");if(vn)vn.value=AXP.head.vendor||"";c.querySelector("#ax-empty").onclick=aEmptyGrid;c.querySelector("#ax-xlsx").onclick=aXlsx;c.querySelector("#ax-gen").onclick=aGen;}
 if(def.img){const im=c.querySelector("#ax-img");if(im)im.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{aSync();AXP.layout_img=rd.result;renderBuilder();};rd.readAsDataURL(f);};}

}
function aTab(t){aSync();BTAB=t;renderBuilder();}
function aEmptyGrid(){aSync();const N=parseInt((document.getElementById("ax-range")||{}).value)||16;const total=N*16;if(total>300&&!confirm(bl("Vygeneruje "+total+" řádků. Pokračovat?","Generate "+total+" rows?")))return;const rows=[];for(let b=0;b<N;b++)for(let bit=0;bit<8;bit++)rows.push({typ:"DI",adr_robot:b+"."+bit,adr_plc:"I"+b+"."+bit,jmeno:"",popis:"",kategorie:"Input"});for(let b=0;b<N;b++)for(let bit=0;bit<8;bit++)rows.push({typ:"DO",adr_robot:b+"."+bit,adr_plc:"Q"+b+"."+bit,jmeno:"",popis:"",kategorie:"Output"});AXP.interface=rows;renderBuilder();}
function aSignals(){aSync();return (AXP.interface||[]).filter(r=>r.jmeno||r.typ).map(r=>({typ:(r.typ||"").toUpperCase(),adr_robot:r.adr_robot||"",adr_plc:r.adr_plc||"",jmeno:r.jmeno||"",popis:r.popis||"",kategorie:r.kategorie||"Ostatní"}));}
function aXlsx(){const sig=aSignals();if(!sig.length){alert(bl("Prázdná tabulka.","Empty."));return;}autoAddress(sig);const headers=["Type","Robot_addr","PLC_addr","Signal_name","Description","Category"];const rows=sig.map(s=>[s.typ,s.adr_robot,s.adr_plc,s.jmeno,s.popis,s.kategorie]);const blob=new Blob([makeXLSX(headers,rows)],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="interface_table.xlsx";a.click();}
function aGen(){const sig=aSignals();if(!sig.length){alert(bl("Prázdná tabulka.","Empty."));return;}const fl=autoAddress(sig);MODE="flat";DATA={signals:sig};window.__filled=fl;render();showResult();}
function aOperator(){aSync();MODE="operator";DATA={op:1};window.__filled=0;render();showResult();}
function aSaveFile(){aSync();const blob=new Blob([JSON.stringify(AXP,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="axon-projekt.json";a.click();}
document.getElementById("buildbtn").onclick=()=>{const c=document.getElementById("buildcard");if(c.style.display=="none"){try{const sv=localStorage.getItem("axon_project");if(sv)AXP=Object.assign(AXP,JSON.parse(sv));}catch(e){}if(!(AXP.interface&&AXP.interface.length))AXP.interface=[{}];c.style.display="block";renderBuilder();c.scrollIntoView({behavior:"smooth"});}else{c.style.display="none";}};
applyLang();
